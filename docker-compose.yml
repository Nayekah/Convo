services:
  reverse-proxy:
    build:
      context: .
      dockerfile: reverse-proxy/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: convo-reverse-proxy
    depends_on:
      backend:
        condition: service_started
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      TLS_DIRECTIVE: ${TLS_DIRECTIVE-tls internal}
    ports:
      - '${APP_HOST_BIND:-0.0.0.0}:${HTTP_HOST_PORT:-80}:80'
      - '${APP_HOST_BIND:-0.0.0.0}:${HTTPS_HOST_PORT:-443}:443'
    volumes:
      - convo_caddy_data:/data
      - convo_caddy_config:/config
    networks:
      - public
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: convo-backend
    environment:
      NODE_ENV: production
      PORT: 9173
      DATABASE_URL: postgres://${POSTGRES_USER:-convo}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-convo_db}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://localhost}
      JWT_ISSUER: ${JWT_ISSUER:-convo-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-convo-web}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?set JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?set JWT_PUBLIC_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '9173'
    ports:
      - '127.0.0.1:9173:9173'
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: convo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convo_db}
      POSTGRES_USER: ${POSTGRES_USER:-convo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - convo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - '5432'
    ports:
      - '127.0.0.1:5532:5432'
    networks:
      - internal
    restart: unless-stopped

networks:
  public:
  internal:

volumes:
  convo_postgres_data:
  convo_caddy_data:
  convo_caddy_config:
