services:
  reverse-proxy:
    image: nginx:stable-alpine
    container_name: convo-reverse-proxy
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - '${APP_HOST_BIND:-0.0.0.0}:4021:80'
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: convo-frontend
    expose:
      - '4021'
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: convo-backend
    environment:
      NODE_ENV: production
      PORT: 9173
      DATABASE_URL: postgres://${POSTGRES_USER:-convo}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-convo_db}
      FRONTEND_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:4021}
      JWT_ISSUER: ${JWT_ISSUER:-convo-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-convo-web}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?set JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?set JWT_PUBLIC_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '9173'
    ports:
      - '${BACKEND_HOST_BIND:-127.0.0.1}:9173:9173'
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: convo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convo_db}
      POSTGRES_USER: ${POSTGRES_USER:-convo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - convo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - '5432'
    ports:
      - '${POSTGRES_HOST_BIND:-127.0.0.1}:5532:5432'
    networks:
      - internal
    restart: unless-stopped

networks:
  public:
  internal:
    internal: true

volumes:
  convo_postgres_data:
